# Development overrides — direct port access for debugging
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  inference:
    ports:
      - "8001:8001"
    volumes:
      - ./services/inference/app:/app/app
      - ./services/inference/models:/models:ro

  api:
    ports:
      - "8000:8000"
    volumes:
      - ./services/api/app:/app/app
    environment:
      - LOG_LEVEL=debug

  frontend:
    ports:
      - "3001:80"

  grafana:
    ports:
      - "3000:3000"

  mlflow:
    ports:
      - "5000:5000"

  prometheus:
    ports:
      - "9090:9090"
